server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;
  absolute_redirect off;

  location = /stank-radio {
    return 308 /stank-radio/;
  }

  location ^~ /stank-radio/assets/ {
    rewrite ^/stank-radio/(.*)$ /$1 break;
    try_files $uri =404;
  }

  location ^~ /stank-radio/images/ {
    rewrite ^/stank-radio/(.*)$ /$1 break;
    try_files $uri =404;
  }

  location ^~ /stank-radio/music/ {
    rewrite ^/stank-radio/music/(.*)$ /music/$1 break;
    try_files $uri =404;
  }

  # Serve static files at the stank-radio root (songs.json, favicon, etc.)
  location ~* ^/stank-radio/(.+\.(json|ico|txt|webmanifest|png|svg))$ {
    rewrite ^/stank-radio/(.*)$ /$1 break;
    try_files $uri =404;
  }

  location ^~ /stank-radio/ {
    try_files /index.html =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
